<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12-Day Study Sprint · May 1–13</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --border: #2a2d35;
    --border-soft: #1e2128;
    --py: #4fc3f7;
    --py-dim: #1a3a4a;
    --java: #81c784;
    --java-dim: #1a3a1e;
    --review: #ffb74d;
    --review-dim: #3a2a10;
    --done: #2a2d35;
    --done-text: #555;
    --text: #e8eaf0;
    --text-dim: #7a7f8e;
    --text-muted: #4a4f5e;
    --accent: #4fc3f7;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 40px 24px 60px;
  }

  .header {
    max-width: 820px;
    margin: 0 auto 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .course-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .progress-block {
    text-align: right;
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.08em;
  }

  .progress-bar-wrap {
    width: 160px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-left: auto;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--py), var(--java));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-top: 6px;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .dot-py { background: var(--py); }
  .dot-java { background: var(--java); }
  .dot-review { background: var(--review); }

  .days {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .day-row {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 0;
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .day-row:hover { border-color: var(--border); }

  .day-row.today { border-color: var(--accent); }
  .day-row.done { opacity: 0.55; }

  .day-label {
    background: var(--surface);
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 1px solid var(--border-soft);
  }

  .day-name {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 3px;
  }

  .day-date {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }

  .today-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 5px;
  }

  .day-content {
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--bg);
  }

  .tasks {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .task-check {
    width: 16px;
    height: 16px;
    min-width: 16px;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .task-check.checked {
    background: var(--py);
    border-color: var(--py);
  }

  .task-check.checked.java-task {
    background: var(--java);
    border-color: var(--java);
  }

  .task-check.checked.review-task {
    background: var(--review);
    border-color: var(--review);
  }

  .checkmark {
    display: none;
    color: #000;
    font-size: 10px;
    font-weight: 700;
  }

  .task-check.checked .checkmark { display: block; }

  .task-text {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
  }

  .task-text.completed {
    color: var(--text-muted);
    text-decoration: line-through;
  }

  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .tag-py { background: var(--py-dim); color: var(--py); }
  .tag-java { background: var(--java-dim); color: var(--java); }
  .tag-review { background: var(--review-dim); color: var(--review); }

  .day-note {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    border-top: 1px solid var(--border-soft);
    padding-top: 8px;
    margin-top: 2px;
  }

  .time-est {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .stats-row {
    max-width: 820px;
    margin: 32px auto 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="course-title">OCW · 12-Day Intensive Sprint</div>
      <h1>May 1 – 13, 2025</h1>
    </div>
    <div class="progress-block">
      <div class="progress-label">overall progress</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-py"></div>Python 6.100L</div>
    <div class="legend-item"><div class="legend-dot dot-java"></div>Java 6.092</div>
    <div class="legend-item"><div class="legend-dot dot-review"></div>Review / Problem set</div>
  </div>
</div>

<div class="days" id="days-container"></div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-num" id="stat-done">0</div>
    <div class="stat-label">tasks done</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-left">0</div>
    <div class="stat-label">tasks left</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-days">12</div>
    <div class="stat-label">days total</div>
  </div>
</div>

<script>
const days = [
  {
    day: "Fri", date: "May 1", today: true,
    note: "First day — set up your environment today before anything else. Install Python 3, VS Code, and Java JDK 21.",
    time: "~3.5h",
    tasks: [
      { text: "Install Python 3.11+, VS Code, Java JDK 21", type: "review" },
      { text: "6.100L · Lec 1: Introduction — types, variables, bindings", type: "py" },
      { text: "6.100L · Lec 2: Strings, I/O, branching", type: "py" },
      { text: "Finger exercises for Lec 1 & 2", type: "py" },
    ]
  },
  {
    day: "Sat", date: "May 2",
    note: "Pure Python day. Focus on understanding loops deeply — they underpin everything in both courses.",
    time: "~4h",
    tasks: [
      { text: "6.100L · Lec 3: Iteration (while loops, for loops)", type: "py" },
      { text: "6.100L · Lec 4: Loops over strings, guess-and-check, binary", type: "py" },
      { text: "6.100L · Lec 5: Floats and approximation methods", type: "py" },
      { text: "Finger exercises for Lec 3–5", type: "py" },
      { text: "Problem Set 0 (ungraded warm-up)", type: "review" },
    ]
  },
  {
    day: "Sun", date: "May 3",
    note: "Weekend — longer study block. Bisection search is a classic CS algorithm, worth spending time on.",
    time: "~5h",
    tasks: [
      { text: "6.100L · Lec 6: Bisection search", type: "py" },
      { text: "6.100L · Lec 7: Decomposition, abstraction, functions", type: "py" },
      { text: "6.100L · Lec 8: Functions as objects", type: "py" },
      { text: "Finger exercises for Lec 6–8", type: "py" },
      { text: "Problem Set 1 — attempt (strings + loops + functions)", type: "review" },
    ]
  },
  {
    day: "Mon", date: "May 4",
    note: "PS1 completion + new material. Lambda and tuples are light — use extra time to really drill PS1.",
    time: "~4.5h",
    tasks: [
      { text: "Finish & review Problem Set 1 with solutions", type: "review" },
      { text: "6.100L · Lec 9: Lambda functions, tuples, lists", type: "py" },
      { text: "6.100L · Lec 10: Lists and mutability", type: "py" },
      { text: "6.100L · Lec 11: Aliasing and cloning", type: "py" },
      { text: "Finger exercises for Lec 9–11", type: "py" },
    ]
  },
  {
    day: "Tue", date: "May 5",
    note: "Java begins. 6.092 (IAP 2010) is the 7-lecture version. Each session = 1h lecture PDF + 1h lab. Do both.",
    time: "~4h",
    tasks: [
      { text: "6.092 Java · Lec 1: Types, variables, operators", type: "java" },
      { text: "6.092 Java · Lab 1: MathCalc + Primes + StringCharacters", type: "java" },
      { text: "6.100L · Lec 12: Dictionaries", type: "py" },
      { text: "Finger exercises for Lec 12", type: "py" },
    ]
  },
  {
    day: "Wed", date: "May 6",
    note: "Recursion is a mind-shift moment for most people. Watch Lec 14 twice if needed — it clicks suddenly.",
    time: "~4h",
    tasks: [
      { text: "6.092 Java · Lec 2: Methods, conditionals, more types", type: "java" },
      { text: "6.092 Java · Lab 2: MadLib exercise", type: "java" },
      { text: "6.100L · Lec 13: Recursion", type: "py" },
      { text: "6.100L · Lec 14: More recursion", type: "py" },
      { text: "Finger exercises for Lec 13–14", type: "py" },
    ]
  },
  {
    day: "Thu", date: "May 7",
    note: "Mid-sprint check. Dictionaries + OOP together — notice how Python objects work before you learn Java classes.",
    time: "~4h",
    tasks: [
      { text: "6.092 Java · Lec 3: Loops and arrays", type: "java" },
      { text: "6.092 Java · Lab 3: Array manipulation practice", type: "java" },
      { text: "6.100L · Lec 15: Dictionaries deep-dive", type: "py" },
      { text: "6.100L · Lec 16: OOP — classes and objects", type: "py" },
      { text: "Finger exercises for Lec 15–16", type: "py" },
      { text: "Problem Set 2 — attempt (recursion + lists + dicts)", type: "review" },
    ]
  },
  {
    day: "Fri", date: "May 8",
    note: "Java OOP day — this is the core of 6.092 and directly mirrors your Leicester OOP module.",
    time: "~4.5h",
    tasks: [
      { text: "6.092 Java · Lec 4: Objects and classes in Java", type: "java" },
      { text: "6.092 Java · Lab 4: Build a simple class hierarchy", type: "java" },
      { text: "Finish Problem Set 2 + review solutions", type: "review" },
      { text: "6.100L · Lec 17: OOP — getters, setters, encapsulation", type: "py" },
      { text: "Finger exercises for Lec 17", type: "py" },
    ]
  },
  {
    day: "Sat", date: "May 9",
    note: "Inheritance + polymorphism — the 'OOP click' moment. Connect what you see in Java to Python side by side.",
    time: "~4h",
    tasks: [
      { text: "6.092 Java · Lec 5: Access control, packages, Java API", type: "java" },
      { text: "6.092 Java · Lab 5: Practice with access modifiers", type: "java" },
      { text: "6.100L · Lec 18: OOP — inheritance and subclasses", type: "py" },
      { text: "Finger exercises for Lec 18", type: "py" },
      { text: "Write a Python class + Java class side by side (same concept)", type: "review" },
    ]
  },
  {
    day: "Sun", date: "May 10",
    note: "Weekend — heavier session. Debugging and interfaces are practical skills you'll use every day.",
    time: "~5.5h",
    tasks: [
      { text: "6.092 Java · Lec 6: Design, debugging, interfaces", type: "java" },
      { text: "6.092 Java · Lab 6: Debug a broken Java program", type: "java" },
      { text: "6.100L · Lec 19: Exceptions and assertions", type: "py" },
      { text: "6.100L · Lec 20: More OOP — special methods (__str__, __eq__)", type: "py" },
      { text: "Problem Set 3 — attempt (OOP focused)", type: "review" },
    ]
  },
  {
    day: "Mon", date: "May 11",
    note: "Final Java lecture — you finish 6.092 today. Inheritance in Java is the direct prep for your Leicester coursework.",
    time: "~5h",
    tasks: [
      { text: "6.092 Java · Lec 7: Inheritance, exceptions, file I/O", type: "java" },
      { text: "6.092 Java · Lab 7: Final lab — complete the series", type: "java" },
      { text: "6.092 Java complete — review all 7 lecture PDFs", type: "review" },
      { text: "Finish Problem Set 3 + review solutions", type: "review" },
      { text: "6.100L · Lec 21: Generators and iterators", type: "py" },
    ]
  },
  {
    day: "Tue", date: "May 12",
    note: "Final full study day. Problem sets are your best revision tool — mark where you got stuck.",
    time: "~5h",
    tasks: [
      { text: "6.100L · Lec 22: Complexity and Big-O notation", type: "py" },
      { text: "6.100L · Lec 23: Searching algorithms", type: "py" },
      { text: "Problem Set 4 — attempt (complexity + searching)", type: "review" },
      { text: "Finger exercises for Lec 19–23", type: "py" },
    ]
  },
  {
    day: "Wed", date: "May 13",
    note: "Sprint complete! Consolidation day — no new lectures. Review, Anki, and write a short reflection on what you've built.",
    time: "~3h",
    tasks: [
      { text: "Review all Java OOP concepts — write cheat sheet by hand", type: "review" },
      { text: "Review Python OOP + recursion — explain each to yourself", type: "review" },
      { text: "Add 20+ Anki cards from both courses", type: "review" },
      { text: "Identify 3 areas you're weakest on → flag for week 3", type: "review" },
      { text: "Write a Python class + Java class that does the same thing", type: "review" },
    ]
  },
];

const STORAGE_KEY = 'study_sprint_checks_may2025';

function loadChecks() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch { return {}; }
}

function saveChecks(checks) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checks)); } catch {}
}

let checks = loadChecks();

function updateStats() {
  let total = 0, done = 0;
  days.forEach((d, di) => {
    d.tasks.forEach((t, ti) => {
      total++;
      if (checks[`${di}-${ti}`]) done++;
    });
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-left').textContent = total - done;
}

function render() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';

  days.forEach((d, di) => {
    const allDone = d.tasks.every((_, ti) => checks[`${di}-${ti}`]);

    const row = document.createElement('div');
    row.className = 'day-row' + (d.today ? ' today' : '') + (allDone ? ' done' : '');

    const labelHTML = `
      <div class="day-label">
        <div class="day-name">${d.day}</div>
        <div class="day-date">${d.date.replace('May ', '')}<span style="font-size:12px;color:var(--text-dim)"> May</span></div>
        ${d.today ? '<div class="today-tag">today</div>' : ''}
      </div>`;

    const tasksHTML = d.tasks.map((t, ti) => {
      const key = `${di}-${ti}`;
      const isChecked = !!checks[key];
      const typeClass = t.type === 'py' ? '' : t.type === 'java' ? 'java-task' : 'review-task';
      const tagLabel = t.type === 'py' ? 'Python' : t.type === 'java' ? 'Java' : 'Review';
      const tagClass = `tag-${t.type}`;
      return `
        <div class="task">
          <div class="task-check ${isChecked ? 'checked ' + typeClass : ''}" data-key="${key}" data-type="${t.type}">
            <span class="checkmark">✓</span>
          </div>
          <div class="task-text ${isChecked ? 'completed' : ''}">
            ${t.text}
            <span class="tag ${tagClass}">${tagLabel}</span>
          </div>
        </div>`;
    }).join('');

    row.innerHTML = `
      ${labelHTML}
      <div class="day-content">
        <div class="tasks">${tasksHTML}</div>
        ${d.note ? `<div class="day-note">${d.note}</div>` : ''}
        <div class="time-est">est. ${d.time}</div>
      </div>`;

    row.querySelectorAll('.task-check').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = el.dataset.key;
        checks[key] = !checks[key];
        saveChecks(checks);
        render();
        updateStats();
      });
    });

    container.appendChild(row);
  });
}

render();
updateStats();
</script>
</body>
</html>
